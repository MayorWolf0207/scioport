<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ScioPort – Admin</title>
  <style>
    :root{
      --bg:#eff4fa;
      --panel:#0f172a;
      --panel2:#172554;
      --text:#e2e8f0;
      --fg:#0f172a;
      --muted:#475569;
      --border:#dbe4ef;
      --accent:#2bbcff;
      --accent2:#3bd4b0;
      --ok:#16a34a;
      --warn:#ca8a04;
      --danger:#dc2626;
      --r:14px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background:
        radial-gradient(900px 400px at 15% -10%, rgba(43,188,255,.22), transparent 55%),
        radial-gradient(700px 380px at 85% 0, rgba(59,212,176,.18), transparent 60%),
        linear-gradient(180deg,#eaf1f8,#f7fbff);
      color:var(--fg);
    }
    body[data-theme="dark"]{
      background:
        radial-gradient(900px 420px at 10% -10%, rgba(34,211,238,.15), transparent 55%),
        radial-gradient(780px 420px at 90% 0, rgba(59,130,246,.14), transparent 60%),
        linear-gradient(180deg,#020617,#0b1220);
      color:#e2e8f0;
    }
    .app{
      min-height:100vh;
      display:grid;
      grid-template-columns:280px 1fr;
      gap:16px;
      padding:16px;
    }
    .app.sidebar-collapsed{
      grid-template-columns:1fr;
    }
    .app.sidebar-collapsed .sidebar{
      display:none;
    }
    @media (max-width:980px){
      .app{grid-template-columns:1fr}
    }
    .sidebar{
      background:
        radial-gradient(500px 300px at 10% 0, rgba(43,188,255,.22), transparent 65%),
        linear-gradient(180deg, var(--panel2), var(--panel));
      border-radius:18px;
      color:var(--text);
      padding:14px;
      border:1px solid rgba(255,255,255,.15);
      box-shadow:0 16px 40px rgba(15,23,42,.3);
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .brand{
      border:1px solid rgba(255,255,255,.18);
      border-radius:16px;
      padding:10px 12px;
      background:rgba(255,255,255,.05);
    }
    .brand h1{margin:0;font-size:15px}
    .brand p{margin:4px 0 0 0;font-size:12px;opacity:.85}
    .nav{display:flex;flex-direction:column;gap:8px}
    .nav button{
      border:1px solid rgba(255,255,255,.16);
      color:var(--text);
      background:rgba(255,255,255,.04);
      text-align:left;
      border-radius:12px;
      padding:10px 12px;
      cursor:pointer;
      font-size:13px;
      display:flex;
      align-items:center;
      justify-content:space-between;
    }
    .nav button.active{
      background:linear-gradient(135deg, rgba(43,188,255,.35), rgba(59,212,176,.22));
      border-color:rgba(43,188,255,.65);
    }
    .pill{
      font-size:11px;
      border:1px solid rgba(255,255,255,.2);
      border-radius:999px;
      padding:2px 7px;
    }
    .sidebar .actions{
      margin-top:auto;
      display:grid;
      gap:8px;
    }
    .btn{
      border:1px solid var(--border);
      border-radius:12px;
      padding:8px 10px;
      background:#fff;
      color:var(--fg);
      cursor:pointer;
      font-size:13px;
    }
    .btn.primary{
      background:linear-gradient(135deg, rgba(43,188,255,.2), rgba(59,212,176,.16));
      border-color:rgba(43,188,255,.4);
    }
    .btn.warn{border-color:rgba(202,138,4,.35); background:rgba(202,138,4,.1)}
    .btn.danger{border-color:rgba(220,38,38,.35); background:rgba(220,38,38,.1)}
    .main{
      background:#fff;
      border:1px solid var(--border);
      border-radius:18px;
      box-shadow:0 12px 32px rgba(15,23,42,.12);
      overflow:hidden;
      display:flex;
      flex-direction:column;
      min-height:calc(100vh - 32px);
    }
    .topbar{
      border-bottom:1px solid var(--border);
      padding:12px 14px;
      display:flex;
      justify-content:space-between;
      gap:10px;
      position:sticky;
      top:0;
      background:rgba(255,255,255,.92);
      backdrop-filter: blur(8px);
      z-index:10;
    }
    .topbar h2{margin:0;font-size:15px}
    .topbar p{margin:3px 0 0 0;font-size:12px;color:var(--muted)}
    #content{padding:14px}
    .card{
      border:1px solid var(--border);
      border-radius:16px;
      background:#fff;
      margin-bottom:12px;
      overflow:hidden;
    }
    .card h3{
      margin:0;
      font-size:13px;
      padding:11px 12px;
      background:linear-gradient(180deg, rgba(43,188,255,.08), rgba(255,255,255,.9));
      border-bottom:1px solid var(--border);
    }
    .cardBody{padding:12px}
    .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:10px}
    .col12{grid-column:span 12}
    .col6{grid-column:span 6}
    .col4{grid-column:span 4}
    .kpi{
      border:1px solid var(--border);
      border-radius:12px;
      background:#f8fbff;
      padding:10px;
    }
    .kpi b{font-size:20px}
    .kpi span{display:block;font-size:12px;color:var(--muted);margin-top:4px}
    .list{display:flex;flex-direction:column;gap:8px}
    .item{
      border:1px solid var(--border);
      border-radius:12px;
      padding:10px;
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:10px;
    }
    .studentEntryActions{
      display:flex;
      align-items:center;
      gap:8px;
      flex-shrink:0;
    }
    .studentOverviewPostModal{
      position:fixed;
      inset:0;
      z-index:120;
      background:rgba(15,23,42,.58);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:16px;
    }
    .studentOverviewPostDialog{
      width:min(820px,100%);
      max-height:min(92vh,920px);
      background:#fff;
      border:1px solid var(--border);
      border-radius:18px;
      box-shadow:0 22px 48px rgba(2,6,23,.35);
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }
    .studentOverviewPostHead{
      border-bottom:1px solid var(--border);
      padding:12px 14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }
    .studentOverviewPostHead h3{
      margin:0;
      font-size:14px;
    }
    .studentOverviewPostBody{
      padding:12px 14px;
      border-bottom:1px solid var(--border);
      max-height:36vh;
      overflow:auto;
      display:grid;
      gap:8px;
    }
    .studentOverviewPostMeta{
      margin:0;
      font-size:12px;
      color:var(--muted);
    }
    .studentOverviewPostText{
      margin:0;
      font-size:13px;
      line-height:1.45;
      white-space:pre-wrap;
      word-break:break-word;
    }
    .studentOverviewPostComments{
      padding:12px 14px 14px;
      display:grid;
      gap:8px;
    }
    .studentOverviewPostComments h4{
      margin:0;
      font-size:13px;
    }
    .studentOverviewCommentList{
      max-height:230px;
      overflow:auto;
      margin:0;
    }
    .studentOverviewCommentItem{
      display:grid;
      gap:6px;
    }
    .studentOverviewCommentItem.guide{
      border-color:rgba(22,163,74,.45);
      background:linear-gradient(180deg, rgba(22,163,74,.11), #fff);
    }
    .studentOverviewCommentHead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      flex-wrap:wrap;
    }
    .studentOverviewCommentAuthorWrap{
      display:inline-flex;
      align-items:center;
      gap:6px;
      min-width:0;
    }
    .studentOverviewCommentAuthor{
      font-size:12px;
      font-weight:600;
    }
    .studentOverviewCommentBadge{
      border:1px solid rgba(22,163,74,.4);
      background:rgba(22,163,74,.12);
      color:#166534;
      border-radius:999px;
      padding:2px 7px;
      font-size:10px;
      font-weight:700;
      letter-spacing:.01em;
    }
    .studentOverviewCommentTime{
      font-size:11px;
      color:var(--muted);
    }
    .studentOverviewCommentText{
      margin:0;
      font-size:13px;
      line-height:1.4;
      white-space:pre-wrap;
      word-break:break-word;
    }
    .studentOverviewCommentStatus{
      margin:0;
      min-height:1.2em;
    }
    .studentOverviewCommentStatus.error{
      color:#b91c1c;
    }
    body.modal-open{
      overflow:hidden;
    }
    .title{font-size:13px;font-weight:600}
    .meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:5px}
    .badge{
      font-size:11px;
      border:1px solid var(--border);
      border-radius:999px;
      padding:2px 7px;
      background:#f8fafc;
    }
    .badge.ok{background:rgba(22,163,74,.12);border-color:rgba(22,163,74,.35);color:#166534}
    .badge.warn{background:rgba(202,138,4,.14);border-color:rgba(202,138,4,.35);color:#854d0e}
    .badge.unread{background:rgba(43,188,255,.15);border-color:rgba(43,188,255,.35);color:#075985}
    .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    input, textarea, select{
      width:100%;
      border:1px solid var(--border);
      border-radius:12px;
      padding:9px 10px;
      font-size:13px;
      color:var(--fg);
      background:#fff;
    }
    textarea{min-height:84px;resize:vertical}
    label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}
    .empty{
      border:1px dashed var(--border);
      border-radius:12px;
      padding:12px;
      font-size:13px;
      color:var(--muted);
      background:#fbfdff;
    }
    .hint{font-size:12px;color:var(--muted)}
    .split{
      display:grid;
      grid-template-columns:300px 1fr;
      gap:12px;
    }
    @media (max-width:980px){
      .split{grid-template-columns:1fr}
      .col6,.col4{grid-column:span 12}
    }
    .classBtn{
      width:100%;
      text-align:left;
      border:1px solid var(--border);
      border-radius:12px;
      padding:9px;
      background:#fff;
      cursor:pointer;
      margin-bottom:8px;
    }
    .classBtn.active{
      border-color:rgba(43,188,255,.45);
      background:rgba(43,188,255,.1);
    }
    .composeWrap{
      background:#f6f8fb;
      border:1px solid var(--border);
      border-radius:16px;
      padding:14px;
    }
    .composeGrid{
      display:grid;
      grid-template-columns:repeat(12,minmax(0,1fr));
      gap:12px 14px;
    }
    .composeCol12{grid-column:span 12}
    .composeCol6{grid-column:span 6}
    .composeDivider{
      border:0;
      border-top:1px solid var(--border);
      margin:14px 0;
    }
    .composeHint{
      font-size:12px;
      color:var(--muted);
      margin:6px 0 0;
    }
    .composeSub{
      margin:0 0 8px;
      font-size:13px;
      color:var(--muted);
      font-weight:600;
    }
    .composeActions{
      margin-top:12px;
      display:flex;
      justify-content:flex-end;
      gap:8px;
      flex-wrap:wrap;
    }
    .hidden{display:none!important}
    .composeWrap input,
    .composeWrap textarea,
    .composeWrap select{
      background:#fff;
    }
    .composeCheckList{
      display:grid;
      gap:6px;
      max-height:180px;
      overflow:auto;
      border:1px solid var(--border);
      border-radius:12px;
      padding:8px;
      background:#fff;
    }
    .composeFilterInput{
      margin-bottom:8px;
    }
    .composeCheckEmpty.filterEmpty{
      margin-top:8px;
    }
    .composeCheckItem{
      display:flex;
      align-items:flex-start;
      gap:8px;
      margin:0;
      font-size:12px;
      color:var(--fg);
    }
    .composeCheckItem input{
      width:auto;
      margin-top:2px;
      flex-shrink:0;
    }
    .composeCheckEmpty{
      border:1px dashed var(--border);
      border-radius:10px;
      padding:8px;
      color:var(--muted);
      font-size:12px;
      background:#fbfdff;
    }
    @media (max-width:980px){
      .composeCol6{grid-column:span 12}
    }
    .toastWrap{
      position:fixed;
      right:16px;
      bottom:16px;
      z-index:90;
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .toast{
      background:#fff;
      border:1px solid var(--border);
      border-radius:12px;
      box-shadow:0 16px 35px rgba(15,23,42,.16);
      padding:10px 12px;
      font-size:13px;
      min-width:260px;
    }
    .toast small{display:block;color:var(--muted);margin-top:3px}
    .dashWrap{
      border-radius:16px;
      border:1px solid var(--border);
      background:#f8fbff;
      overflow:hidden;
    }
    .dashHead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:12px 14px;
      border-bottom:1px solid var(--border);
      background:linear-gradient(180deg, rgba(43,188,255,.12), rgba(255,255,255,.95));
    }
    .dashHeadTitle{
      display:inline-block;
      margin:0;
      font-size:28px;
      line-height:1;
    }
    .dashHeadMeta{
      margin-left:10px;
      color:var(--muted);
      font-size:13px;
      font-weight:600;
    }
    .dashWeekChip{
      border:1px solid var(--border);
      border-radius:999px;
      padding:7px 12px;
      background:#eef4f8;
      font-size:12px;
      white-space:nowrap;
    }
    .dashBody{
      padding:14px;
    }
    .dashMetricGrid{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:12px;
    }
    .dashMetric{
      border:1px solid #d3dbe5;
      border-radius:22px;
      background:#fff;
      padding:14px 16px;
    }
    .dashMetricValue{
      font-size:36px;
      line-height:1.05;
      margin:0;
      letter-spacing:-0.02em;
      font-weight:600;
      color:#1e293b;
    }
    .dashMetricLabel{
      margin-top:8px;
      font-size:13px;
      color:#475569;
    }
    .dashSplit{
      display:grid;
      grid-template-columns:minmax(0,1fr) minmax(0,1fr);
      gap:14px;
    }
    .dashSectionHead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:10px;
      gap:8px;
    }
    .dashSectionTitle{
      margin:0;
      font-size:20px;
      line-height:1;
      color:#c7d4e9;
      text-shadow:0 1px 0 rgba(255,255,255,.18);
    }
    .dashGhostBtn{
      border:1px solid var(--border);
      border-radius:14px;
      background:#fff;
      padding:7px 12px;
      font-size:14px;
      cursor:pointer;
      color:var(--fg);
    }
    .dashNotifList{
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .dashNotifItem{
      border:1px solid #d3dbe5;
      border-radius:20px;
      background:#fff;
      padding:13px 14px;
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
    }
    .dashNotifTitle{
      margin:0;
      font-size:24px;
      line-height:1.12;
      font-weight:500;
      color:#1f2937;
    }
    .dashChips{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:8px;
    }
    .dashChip{
      border:1px solid #c9d2dd;
      border-radius:999px;
      padding:4px 11px;
      font-size:12px;
      color:#334155;
      background:#f4f7fb;
      white-space:nowrap;
    }
    .dashState{
      border:1px solid #e5c68a;
      color:#a16207;
      background:#fff8e8;
      border-radius:999px;
      padding:4px 11px;
      font-size:12px;
      white-space:nowrap;
    }
    .dashState.read{
      border-color:#bbf7d0;
      color:#166534;
      background:#ecfdf3;
    }
    .dashOpenBtn{
      border:1px solid #d1d9e4;
      border-radius:14px;
      padding:7px 12px;
      background:#fff;
      font-size:14px;
      cursor:pointer;
      color:#1f2937;
    }
    .dashActionList{
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .dashActionItem{
      border:1px solid #d3dbe5;
      border-radius:20px;
      background:#fff;
      padding:14px;
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
    }
    .dashActionTitle{
      margin:0;
      font-size:23px;
      line-height:1.1;
      color:#1f2937;
    }
    .dashActionBtn{
      border:1px solid #8fd3f7;
      border-radius:20px;
      padding:8px 16px;
      background:#dff3ff;
      color:#0f172a;
      font-size:14px;
      cursor:pointer;
      white-space:nowrap;
    }
    .dashActionBtn.neutral{
      border-color:#d1d9e4;
      background:#f8fafc;
    }
    .dashShortcut{
      margin-top:12px;
      border-top:1px solid var(--border);
      padding-top:12px;
      color:#64748b;
      font-size:14px;
    }
    .dashKey{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:22px;
      height:22px;
      padding:0 8px;
      border:1px solid #cbd5e1;
      border-radius:10px;
      background:#f8fafc;
      color:#334155;
      font-size:12px;
      margin:0 3px;
    }
    .notifStack{
      display:flex;
      flex-direction:column;
      gap:12px;
    }
    .notifIntro{
      border:1px solid var(--border);
      border-radius:22px;
      background:#fff;
      padding:14px 16px;
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
    }
    .notifIntroTitle{
      margin:0;
      font-size:30px;
      line-height:1.1;
      color:#0f172a;
    }
    .notifIntroSub{
      margin:6px 0 0;
      color:#475569;
      font-size:16px;
    }
    .notifIntroActions{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }
    .notifShortcut{
      display:inline-flex;
      align-items:center;
      gap:6px;
      color:#475569;
      font-size:15px;
      white-space:nowrap;
    }
    .notifPanel{
      border:1px solid var(--border);
      border-radius:22px;
      overflow:hidden;
      background:#f8fbff;
    }
    .notifPanelHead{
      padding:14px 16px;
      border-bottom:1px solid var(--border);
      background:linear-gradient(180deg, rgba(43,188,255,.12), rgba(255,255,255,.95));
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }
    .notifPanelTitle{
      margin:0;
      font-size:31px;
      line-height:1.08;
      color:#0f172a;
    }
    .notifPanelHint{
      margin-left:8px;
      font-size:15px;
      color:#475569;
      font-weight:500;
    }
    .notifPanelControls{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      margin-left:auto;
    }
    .notifSearch{
      width:300px;
      max-width:100%;
      border-radius:16px;
    }
    .notifList{
      padding:12px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .notifItem{
      border:1px solid #d3dbe5;
      border-radius:20px;
      background:#fff;
      padding:13px 14px;
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
    }
    .notifItemTitle{
      margin:0;
      font-size:31px;
      line-height:1.09;
      color:#1f2937;
      font-weight:500;
    }
    .notifEmpty{
      margin:0 12px 12px;
    }
    @media (max-width:1200px){
      .dashMetricGrid{grid-template-columns:repeat(2,minmax(0,1fr))}
      .dashSplit{grid-template-columns:1fr}
    }
    @media (max-width:760px){
      .dashMetricGrid{grid-template-columns:1fr}
      .dashHead{flex-direction:column;align-items:flex-start}
      .dashWeekChip{white-space:normal}
      .dashActionItem,
      .dashNotifItem{flex-direction:column}
      .notifIntro,
      .notifItem{flex-direction:column}
      .notifPanelControls{margin-left:0}
      .notifSearch{width:100%}
      .studentEntryActions{width:100%}
      .studentEntryActions .btn{width:100%}
      .studentOverviewPostModal{padding:10px}
      .studentOverviewPostDialog{max-height:95vh}
      .studentOverviewPostBody,
      .studentOverviewPostComments,
      .studentOverviewPostHead{padding-left:10px;padding-right:10px}
    }
    body[data-theme="dark"] .main{
      background:#0b1220;
      border-color:#334155;
      box-shadow:0 18px 40px rgba(2,6,23,.65);
    }
    body[data-theme="dark"] .topbar{
      border-bottom-color:#334155;
      background:rgba(11,18,32,.9);
    }
    body[data-theme="dark"] .topbar p,
    body[data-theme="dark"] label,
    body[data-theme="dark"] .hint,
    body[data-theme="dark"] .composeHint,

    @font-face{
      font-family:"GothamRnd";
      src:url("Fonts/gothamrnd_medium.otf") format("opentype");
      font-weight:500;
      font-style:normal;
      font-display:swap;
    }
    :root{
      --bg:#fff8ef;
      --bg-soft:#fffdf9;
      --panel:#fff4e7;
      --panel2:#ff9a3c;
      --text:#2d241a;
      --fg:#2d241a;
      --muted:#7f6a58;
      --border:rgba(205,138,74,.22);
      --accent:#ff9a3c;
      --accent2:#ffbe6a;
      --accent3:#5bc7cc;
      --ok:#2fa76d;
      --warn:#d9912f;
      --danger:#da6552;
      --glass:rgba(255,255,255,.68);
      --shadow:0 28px 60px rgba(172,98,36,.18);
      --r:28px;
    }
    body{
      position:relative;
      font-family:"GothamRnd","Trebuchet MS",system-ui,sans-serif;
      background:
        radial-gradient(780px 420px at 8% -8%, rgba(255,190,106,.42), transparent 55%),
        radial-gradient(760px 480px at 95% 4%, rgba(91,199,204,.22), transparent 58%),
        linear-gradient(180deg, #fff7ef 0%, #fff3e2 48%, #fffaf5 100%);
      color:var(--fg);
    }
    body::before,
    body::after{
      content:"";
      position:fixed;
      pointer-events:none;
      border-radius:50%;
      filter:blur(8px);
      z-index:0;
    }
    body::before{
      width:420px;
      height:420px;
      left:-150px;
      bottom:-170px;
      background:rgba(255,154,60,.16);
    }
    body::after{
      width:360px;
      height:360px;
      right:-120px;
      top:110px;
      background:rgba(91,199,204,.14);
    }
    body[data-theme="dark"]{
      --bg:#22170f;
      --bg-soft:#2d1d12;
      --panel:#2d1d12;
      --panel2:#ff9a3c;
      --text:#f9ead9;
      --fg:#f9ead9;
      --muted:#d1b395;
      --border:rgba(255,190,130,.15);
      --glass:rgba(48,29,18,.82);
      --shadow:0 28px 60px rgba(0,0,0,.42);
      background:
        radial-gradient(820px 500px at 8% -8%, rgba(255,154,60,.16), transparent 54%),
        radial-gradient(740px 440px at 100% 0, rgba(91,199,204,.14), transparent 58%),
        linear-gradient(180deg, #120c07 0%, #1d140d 46%, #2b1c10 100%);
      color:var(--fg);
    }
    body,
    input,
    textarea,
    select,
    button{
      font-family:"GothamRnd","Trebuchet MS",system-ui,sans-serif;
    }
    .app,
    .toastWrap,
    .studentOverviewPostModal{
      position:relative;
      z-index:1;
    }
    .app{

      padding:24px;
      gap:22px;
      grid-template-columns:310px minmax(0,1fr);
    }

  function normalizePortfolioText(value) {
    return String(value || "")
      .replace(/<a\s+[^>]*>(.*?)<\/a>/gi, "$1")
      .replace(/<[^>]+>/g, " ")
      .replace(/\s+/g, " ")
      .trim();
  }

  function normalizePortfolioLongText(value) {
    return String(value || "")
      .replace(/<a\s+[^>]*>(.*?)<\/a>/gi, "$1")
      .replace(/<[^>]+>/g, " ")
      .replace(/\r/g, "")
      .replace(/[ \t]+/g, " ")
      .replace(/\n{3,}/g, "\n\n")
      .trim();
  }

  function extractSubjectsFromPortfolioValue(value) {
    const matches = String(value || "").match(/@[^\s,.;:!?]+/g) || [];
    return uniqueValues(matches.map(function (item) {
      return normalizeSubjectName(item);
    }).filter(Boolean));
  }

  function normalizeCategoryKey(value) {
    return normalizeSearchText(value);
  }

  function collectStudentOverviewFilterOptions(portfolio) {
    const source = portfolio || { entries: [], responses: [] };
    const subjectMap = new Map();
    const pillarMap = new Map();

    function addOptions(map, values) {
      (Array.isArray(values) ? values : []).forEach(function (value) {
        const label = String(value || "").trim();
        const key = normalizeCategoryKey(label);
        if (!label || !key || map.has(key)) {
          return;
        }
        map.set(key, label);
      });
    }

    (Array.isArray(source.entries) ? source.entries : []).forEach(function (item) {
      addOptions(subjectMap, item && item.subjects ? item.subjects : []);
      addOptions(pillarMap, item && item.pillars ? item.pillars : []);
    });
    (Array.isArray(source.responses) ? source.responses : []).forEach(function (item) {
      addOptions(subjectMap, item && item.subjects ? item.subjects : []);
      addOptions(pillarMap, item && item.pillars ? item.pillars : []);
    });

    function sortOptions(map) {
      return Array.from(map.entries()).map(function (entry) {
        return { key: entry[0], label: entry[1] };
      }).sort(function (a, b) {
        return a.label.localeCompare(b.label, "cs");
      });
    }

    return {
      subjects: sortOptions(subjectMap),
      pillars: sortOptions(pillarMap)
    };
  }

  function itemMatchesStudentOverviewFilters(item, selectedSubjects, selectedPillars) {
    const subjectSet = selectedSubjects instanceof Set ? selectedSubjects : new Set();
    const pillarSet = selectedPillars instanceof Set ? selectedPillars : new Set();
    const itemSubjectKeys = new Set((Array.isArray(item && item.subjects) ? item.subjects : []).map(function (value) {
      return normalizeCategoryKey(value);
    }).filter(Boolean));
    const itemPillarKeys = new Set((Array.isArray(item && item.pillars) ? item.pillars : []).map(function (value) {
      return normalizeCategoryKey(value);
    }).filter(Boolean));

    const subjectMatch = !subjectSet.size || Array.from(subjectSet.values()).some(function (key) {
      return itemSubjectKeys.has(key);
    });
    if (!subjectMatch) {
      return false;
    }

    const pillarMatch = !pillarSet.size || Array.from(pillarSet.values()).some(function (key) {
      return itemPillarKeys.has(key);
    });
    return pillarMatch;
  }

  function applyStudentOverviewFilters(portfolio) {
    const source = portfolio || { entries: [], responses: [] };
    const entries = (Array.isArray(source.entries) ? source.entries : []).filter(function (item) {
      return itemMatchesStudentOverviewFilters(item, studentOverviewSubjectFilters, studentOverviewPillarFilters);
    });
    const responses = (Array.isArray(source.responses) ? source.responses : []).filter(function (item) {
      return itemMatchesStudentOverviewFilters(item, studentOverviewSubjectFilters, studentOverviewPillarFilters);
    });
    return {
      entries: entries,
      responses: responses
    };
  }

    return (
      '<div class="composeWrap" style="margin-top:12px">' +

      '<div class="composeGrid">' +

      '<div class="composeActions">' +
      '<button class="btn" id="studentOverviewFilterReset" type="button">Reset filtrů</button>' +
      '</div>' +
      '</div>'
    );

  async function resolveUserDocRefByStudent(student) {
    if (!usersRef || !student) {
      return null;
    }
    const uid = String(student.uid || "").trim();
    if (uid) {
      return usersRef.doc(uid);
    }
    const email = normalizeEmail(student.email || "");
    if (!email) {
      return null;
    }
    try {
      let snapshot = await usersRef.where("emailLower", "==", email).limit(1).get();
      if (snapshot.empty) {
        snapshot = await usersRef.where("email", "==", email).limit(1).get();
      }
      if (!snapshot.empty) {
        return snapshot.docs[0].ref;
      }
    } catch (error) {
      console.warn("Student overview email lookup failed:", error);
    }
    return null;
  }

  async function loadStudentPortfolio(student) {
    const userRef = await resolveUserDocRefByStudent(student);
    if (!userRef) {
      return { entries: [], responses: [] };
    }

    const entries = [];
    const responses = [];

    try {
      let dataSnapshot;
      try {
        dataSnapshot = await userRef.collection("data").orderBy("timestamp", "desc").limit(200).get();
      } catch (error) {
        dataSnapshot = await userRef.collection("data").limit(200).get();
      }
      dataSnapshot.forEach(function (doc) {
        const data = doc.data() || {};
        const rawValue = String(data.value || "").trim();
        const text = normalizePortfolioText(rawValue);
        const title = String(data.title || "").trim();
        const note = String(data.note || "").trim();
        const fullTextSource = title && note
          ? title + "\n" + note
          : (title || note || rawValue);
        const fullText = normalizePortfolioLongText(fullTextSource);
        const subjects = collectTemplateValues(data, "subjects", "subject");
        const pillars = collectTemplateValues(data, "pillars", "pillar");
        const derivedSubjects = subjects.length ? subjects : extractSubjectsFromPortfolioValue(rawValue);
        const timestampMillis = toMillis(data.timestamp || data.updatedAt || data.createdAt || 0);
        entries.push({
          id: doc.id,
          text: text,
          fullText: fullText || text,
          subjects: derivedSubjects,
          pillars: pillars,
          timestampMillis: timestampMillis,
          ownerUid: userRef.id
        });
      });
    } catch (error) {
      console.error("Student overview data load failed:", error);
    }

    try {
      let responseSnapshot;
      try {
        responseSnapshot = await userRef.collection("templateResponses").orderBy("updatedAt", "desc").limit(200).get();
      } catch (error) {
        responseSnapshot = await userRef.collection("templateResponses").limit(200).get();
      }
      responseSnapshot.forEach(function (doc) {
        const data = doc.data() || {};
        responses.push({
          id: doc.id,
          templateTitle: String(data.templateTitle || data.title || "Bez názvu").trim(),
          response: String(data.response || data.value || "").trim(),
          subjects: collectTemplateValues(data, "subjects", "subject"),
          pillars: collectTemplateValues(data, "pillars", "pillar"),
          updatedAtMillis: toMillis(data.updatedAt || data.timestamp || data.createdAt || 0)
        });
      });
    } catch (error) {
      console.error("Student overview responses load failed:", error);
    }

    entries.sort(function (a, b) {
      return (b.timestampMillis || 0) - (a.timestampMillis || 0);
    });
    responses.sort(function (a, b) {
      return (b.updatedAtMillis || 0) - (a.updatedAtMillis || 0);
    });

    return {
      entries: entries,
      responses: responses
    };
  }

      author.className = "studentOverviewCommentAuthor";

        const badge = document.createElement("span");

        authorWrap.appendChild(badge);

  function subscribeStudentOverviewComments(entry) {
    detachStudentOverviewCommentListener();
    if (!usersRef || !entry || !entry.ownerUid || !entry.id) {
      renderStudentOverviewCommentList([]);
      return;
    }
    const commentsRef = usersRef
      .doc(String(entry.ownerUid))
      .collection("data")
      .doc(String(entry.id))
      .collection("comments");

    studentOverviewCommentUnsubscribe = commentsRef
      .orderBy("createdAt", "asc")
      .limit(200)
      .onSnapshot(function (snapshot) {
        const comments = [];
        snapshot.forEach(function (doc) {
          const data = doc.data() || {};
          const text = String(data.text || "").trim();
          if (!text) {
            return;
          }
          comments.push({
            id: doc.id,
            text: text,
            authorEmail: String(data.authorEmail || "").trim(),
            createdAtMillis: toMillis(data.createdAt || data.createdAtClient || 0),
            isGuide: String(data.authorRole || "").trim().toLowerCase() === "guide"
              || hasGuideAccess(data.authorEmail)
          });
        });
        comments.sort(function (a, b) {
          return (a.createdAtMillis || 0) - (b.createdAtMillis || 0);
        });
        renderStudentOverviewCommentList(comments);
      }, function (error) {
        console.error("Student overview comments load failed:", error);
        renderStudentOverviewCommentList([]);
        setStudentOverviewCommentStatus("Komentáře se nepodařilo načíst.", true);
      });
  }

    const normalizedId = String(entryId || "").trim();

    const entry = studentOverviewEntryLookup.get(normalizedId);
    if (!entry) {

      return;

    studentOverviewActiveEntry = entry;
    const textEl = $("#studentOverviewPostText");
    const metaEl = $("#studentOverviewPostMeta");
    const input = $("#studentOverviewCommentInput");

    const subjectText = (entry.subjects || []).slice(0, 3).join(", ");
    const pillarText = (entry.pillars || []).slice(0, 3).join(", ");
    const dateLabel = formatDateTime(entry.timestampMillis);
    const metaParts = [];
    if (dateLabel) {
      metaParts.push(dateLabel);
    }
    if (subjectText) {
      metaParts.push("Předměty: " + subjectText);
    }
    if (pillarText) {
      metaParts.push("Pilíře: " + pillarText);
    }
    if (metaEl) {
      metaEl.textContent = metaParts.join(" · ");
    }

      textEl.textContent = String(entry.fullText || entry.text || "Bez obsahu");

    setStudentOverviewCommentSending(false);

  function closeStudentOverviewPostModal() {
    detachStudentOverviewCommentListener();
    studentOverviewActiveEntry = null;
    setStudentOverviewCommentSending(false);

  async function submitStudentOverviewComment() {
    if (studentOverviewCommentSending) {
      return;
    }
    if (!currentUser || !usersRef || !studentOverviewActiveEntry || !studentOverviewActiveEntry.ownerUid || !studentOverviewActiveEntry.id) {
      return;
    }
    const input = $("#studentOverviewCommentInput");
    const text = String(input && input.value ? input.value : "").trim();
    if (!text) {
      setStudentOverviewCommentStatus("Napiš nejdřív komentář.", true);
      if (input) {
        input.focus();
      }
      return;
    }

    setStudentOverviewCommentSending(true);
    setStudentOverviewCommentStatus("Ukládám komentář...", false);
    try {
      await usersRef
        .doc(String(studentOverviewActiveEntry.ownerUid))
        .collection("data")
        .doc(String(studentOverviewActiveEntry.id))
        .collection("comments")
        .add({
          text: text,
          authorEmail: String(currentUser.email || "").trim(),
          authorUid: currentUser.uid,
          authorRole: "guide",
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          createdAtClient: Date.now()
        });
      if (input) {
        input.value = "";
      }
      setStudentOverviewCommentStatus("Komentář uložen.", false);
    } catch (error) {
      console.error("Student overview comment save failed:", error);
      setStudentOverviewCommentStatus("Komentář se nepodařilo uložit.", true);
    } finally {
      setStudentOverviewCommentSending(false);
      if (input && !input.disabled) {
        input.focus();
      }
    }
  }

  function bindStudentOverviewEvents() {
    const searchInput = $("#studentOverviewSearch");
    if (searchInput) {
      searchInput.addEventListener("input", function () {
        filterStudentOverviewList(searchInput.value);
      });
      filterStudentOverviewList(searchInput.value);
    }

    const list = $("#studentOverviewList");
    if (list) {
      list.addEventListener("click", function (event) {
        const button = event.target && event.target.closest ? event.target.closest(".studentOverviewBtn") : null;
        if (!button || !button.dataset) {
          return;
        }
        const email = String(button.dataset.email || "").trim();
        openStudentOverviewStudent(email);
      });
    }

    const detail = $("#studentOverviewDetail");
    if (detail) {
      detail.addEventListener("change", function (event) {
        const input = event.target && event.target.closest ? event.target.closest("input[data-filter-type][data-filter-key]") : null;
        if (!input || !input.dataset) {
          return;
        }
        const filterType = String(input.dataset.filterType || "").trim();
        const filterKey = String(input.dataset.filterKey || "").trim();
        if (!filterKey) {
          return;
        }
        const targetSet = filterType === "pillar" ? studentOverviewPillarFilters : studentOverviewSubjectFilters;
        if (input.checked) {
          targetSet.add(filterKey);
        } else {
          targetSet.delete(filterKey);
        }
        renderStudentOverviewCurrentDetail();
      });

      detail.addEventListener("click", function (event) {
        const openButton = event.target && event.target.closest ? event.target.closest("[data-entry-action='open-entry-comments'][data-entry-id]") : null;
        if (openButton && openButton.dataset) {
          event.preventDefault();
          openStudentOverviewEntryComments(openButton.dataset.entryId);
          return;
        }
        const resetButton = event.target && event.target.closest ? event.target.closest("#studentOverviewFilterReset") : null;
        if (!resetButton) {
          return;
        }
        event.preventDefault();
        studentOverviewSubjectFilters = new Set();
        studentOverviewPillarFilters = new Set();
        renderStudentOverviewCurrentDetail();
      });
    }
  }

  function uniqueValues(values) {
    const result = [];
    const seen = new Set();
    if (!Array.isArray(values)) {
      return result;
    }
    for (let i = 0; i < values.length; i += 1) {
      const value = String(values[i] || "").trim();
      if (!value) {
        continue;
      }
      const key = value.toLowerCase();
      if (seen.has(key)) {
        continue;
      }
      seen.add(key);
      result.push(value);
    }
    return result;
  }

  function splitCommaValues(value) {
    return uniqueValues(String(value || "").split(",").map(function (item) {
      return item.trim();
    }));
  }

  function getCheckedValues(selector) {
    const nodes = document.querySelectorAll(selector);
    const values = [];
    for (let i = 0; i < nodes.length; i += 1) {
      const node = nodes[i];
      if (node && node.checked) {
        values.push(String(node.value || "").trim());
      }
    }
    return uniqueValues(values);
  }

    for (let i = 0; i < items.length; i += 1) {

      const searchable = String(item.dataset && item.dataset.search ? item.dataset.search : "");
      const isVisible = !query || searchable.indexOf(query) >= 0;
      item.style.display = isVisible ? "" : "none";
      if (isVisible) {

      }

  function buildClassGroups(students) {
    const groups = new Map();
    const source = Array.isArray(students) ? students : [];
    source.forEach(function (student) {

      if (!className) {
        return;
      }
      if (!groups.has(className)) {
        groups.set(className, []);
      }
      groups.get(className).push(student);
    });

    return Array.from(groups.entries())
      .map(function (entry) {
        const className = entry[0];
        const classStudents = entry[1] || [];
        const names = classStudents.map(function (student) {
          return getStudentDisplayName(student);
        }).filter(Boolean).sort(function (a, b) {
          return a.localeCompare(b, "cs");
        });
        return {
          className: className,
          studentCount: classStudents.length,
          names: names
        };
      })
      .sort(function (a, b) {
        return a.className.localeCompare(b.className, "cs");

  function toMillis(value) {
    if (!value && value !== 0) {
      return 0;
    }
    if (typeof value === "number" && Number.isFinite(value)) {
      return value;
    }
    if (value && typeof value.toMillis === "function") {
      return value.toMillis();
    }
    const date = new Date(value);
    return Number.isNaN(date.getTime()) ? 0 : date.getTime();
  }

  function getWeekStartMillis(baseMillis) {
    const date = new Date(baseMillis || Date.now());
    const day = date.getDay();
    const diff = day === 0 ? 6 : day - 1;
    date.setHours(0, 0, 0, 0);
    date.setDate(date.getDate() - diff);
    return date.getTime();
  }

  function getDashboardNotificationSeenKey() {
    const uid = currentUser && currentUser.uid ? currentUser.uid : "guest";
    return "scioport-admin-notif-seen-" + uid;
  }

  function loadDashboardNotificationSeenSet() {
    const seen = new Set();
    try {
      const raw = localStorage.getItem(getDashboardNotificationSeenKey());
      const parsed = raw ? JSON.parse(raw) : [];
      if (Array.isArray(parsed)) {
        parsed.forEach(function (item) {
          const value = String(item || "").trim();
          if (value) {
            seen.add(value);
          }
        });
      }
    } catch (error) {
      // ignore storage errors
    }
    return seen;
  }

  function saveDashboardNotificationSeenSet(seenSet) {
    if (!(seenSet instanceof Set)) {
      return;
    }
    const values = Array.from(seenSet.values()).slice(-DASHBOARD_NOTIF_SEEN_LIMIT);
    try {
      localStorage.setItem(getDashboardNotificationSeenKey(), JSON.stringify(values));
    } catch (error) {
      // ignore storage errors
    }
  }

  function markDashboardNotificationsSeen(keys) {
    if (!Array.isArray(keys) || !keys.length) {
      return;
    }
    const seen = loadDashboardNotificationSeenSet();
    let changed = false;
    keys.forEach(function (key) {
      const value = String(key || "").trim();
      if (!value || seen.has(value)) {
        return;
      }
      seen.add(value);
      changed = true;
    });
    if (changed) {
      saveDashboardNotificationSeenSet(seen);
    }
  }

  function collectTemplateIdsFromGroups(templateGroups) {
    const ids = new Set();
    (Array.isArray(templateGroups) ? templateGroups : []).forEach(function (group) {
      (group && Array.isArray(group.templateIds) ? group.templateIds : []).forEach(function (templateId) {
        const value = String(templateId || "").trim();
        if (value) {
          ids.add(value);
        }
      });
    });
    return Array.from(ids.values());
  }

  async function loadDashboardResponses(templateIds) {
    const ids = [];
    const seenIds = new Set();
    (Array.isArray(templateIds) ? templateIds : []).forEach(function (templateId) {
      const value = String(templateId || "").trim();
      if (!value || seenIds.has(value)) {
        return;
      }
      seenIds.add(value);
      ids.push(value);
    });
    if (!db) {
      return [];
    }

    const idSet = new Set(ids);

    function normalizeResponseDocs(snapshot) {
      const values = [];
      snapshot.forEach(function (doc) {
        const data = doc.data() || {};
        const templateId = String(data.templateId || doc.id || "").trim();
        if (!templateId) {
          return;
        }
        const updatedAtMillis = toMillis(data.updatedAt);
        let userId = String(data.userId || "").trim();
        if (!userId && doc.ref && doc.ref.parent && doc.ref.parent.parent) {
          userId = String(doc.ref.parent.parent.id || "").trim();
        }
        const userEmail = normalizeEmail(data.userEmail || "");
        const subjects = Array.isArray(data.subjects)
          ? data.subjects.map(function (item) { return String(item || "").trim(); }).filter(Boolean)
          : (data.subject ? [String(data.subject || "").trim()].filter(Boolean) : []);
        const pillars = Array.isArray(data.pillars)
          ? data.pillars.map(function (item) { return String(item || "").trim(); }).filter(Boolean)
          : (data.pillar ? [String(data.pillar || "").trim()] : []);
        const responseKey = [userId || userEmail || "user", templateId, String(updatedAtMillis || 0)].join("|");
        values.push({
          responseKey: responseKey,
          templateId: templateId,
          templateTitle: String(data.templateTitle || "").trim(),
          userId: userId,
          userEmail: userEmail,
          subjects: subjects,
          pillars: pillars,
          updatedAtMillis: updatedAtMillis
        });
      });
      return values;
    }

    async function loadResponsesFromUsersSubcollections() {
      if (!usersRef) {
        return [];
      }

      const userSnapshot = await usersRef.get();
      const userDocs = [];
      userSnapshot.forEach(function (doc) {
        userDocs.push(doc);
      });

      const values = [];
      const chunkSize = 15;
      for (let offset = 0; offset < userDocs.length; offset += chunkSize) {
        const chunk = userDocs.slice(offset, offset + chunkSize);
        const chunkValues = await Promise.all(chunk.map(async function (userDoc) {
          try {
            const responseSnapshot = await userDoc.ref.collection("templateResponses").get();
            return normalizeResponseDocs(responseSnapshot);
          } catch (error) {
            return [];
          }
        }));
        chunkValues.forEach(function (list) {
          if (!Array.isArray(list) || !list.length) {
            return;
          }
          for (let i = 0; i < list.length; i += 1) {
            values.push(list[i]);
          }
        });
      }

      if (!idSet.size) {
        return values;
      }
      return values.filter(function (item) {
        return idSet.has(item.templateId);
      });
    }

    const chunkSize = 10;
    let responses = [];

    try {
      if (ids.length) {
        for (let offset = 0; offset < ids.length; offset += chunkSize) {
          const chunk = ids.slice(offset, offset + chunkSize);
          if (!chunk.length) {
            continue;
          }
          const snapshot = await db.collectionGroup("templateResponses").where("templateId", "in", chunk).get();
          responses = responses.concat(normalizeResponseDocs(snapshot));
        }
      }
    } catch (error) {
      responses = [];
    }

    // Fallback 1: přímé čtení users/{uid}/templateResponses bez collectionGroup indexů.
    if (!responses.length) {
      try {
        responses = await loadResponsesFromUsersSubcollections();
      } catch (error) {
        responses = [];
      }
    }

    // Fallback 2: poslední odpovědi obecně.
    if (!responses.length) {
      try {
        const fallbackSnapshot = await db.collectionGroup("templateResponses")
          .orderBy("updatedAt", "desc")
          .limit(200)
          .get();
        const fallbackResponses = normalizeResponseDocs(fallbackSnapshot);
        responses = idSet.size
          ? fallbackResponses.filter(function (item) {
              return idSet.has(item.templateId);
            })
          : fallbackResponses;
      } catch (error) {
        responses = [];
      }
    }

    const deduped = new Map();
    responses.forEach(function (item) {
      const key = String(item && item.responseKey ? item.responseKey : "");
      if (!key) {
        return;
      }
      if (!deduped.has(key)) {
        deduped.set(key, item);
      }
    });
    responses = Array.from(deduped.values());

    responses.sort(function (a, b) {
      return (b.updatedAtMillis || 0) - (a.updatedAtMillis || 0);
    });
    return responses;
  }

    if (student) {

  function formatStudentFillCount(count) {

    if (value === 1) {

  function renderStudentLabelChips(labels, maxVisible, chipClassName) {
    const items = Array.isArray(labels) ? labels.filter(Boolean) : [];
    const chipClass = chipClassName || "dashChip";
    const limit = Number.isFinite(maxVisible) && maxVisible > 0 ? Math.max(1, Math.floor(maxVisible)) : items.length;
    const visible = items.slice(0, limit);
    const parts = visible.map(function (label) {
      return '<span class="' + esc(chipClass) + '">' + esc(label) + '</span>';
    });
    const remaining = items.length - visible.length;
    if (remaining > 0) {
      parts.push('<span class="' + esc(chipClass) + '">+' + String(remaining) + ' dalších</span>');
    }
    return parts.join("");
  }

  function pickMostFrequentLabel(sourceValues, fallback) {
    const counts = new Map();
    (Array.isArray(sourceValues) ? sourceValues : []).forEach(function (value) {
      const item = String(value || "").trim();
      if (!item) {
        return;
      }
      counts.set(item, (counts.get(item) || 0) + 1);
    });
    if (!counts.size) {
      return fallback || "—";
    }
    return Array.from(counts.entries()).sort(function (a, b) {
      const countDiff = b[1] - a[1];
      if (countDiff !== 0) {
        return countDiff;
      }
      return a[0].localeCompare(b[0], "cs");
    })[0][0];
  }

  function computeDeliveredRecipients(templateGroup, classMembers) {
    const recipients = templateGroup && Array.isArray(templateGroup.recipientTargets)
      ? templateGroup.recipientTargets
      : [];
    if (!recipients.length) {
      return Number(templateGroup && templateGroup.recipientCount ? templateGroup.recipientCount : 0);
    }

    const expanded = new Set();
    recipients.forEach(function (target) {
      const type = String(target && target.type ? target.type : "").toLowerCase();
      const value = String(target && target.value ? target.value : "").trim();
      if (!value) {
        return;
      }

      if (type === "student") {
        expanded.add(normalizeEmail(value));
        return;
      }

      if (type === "class") {
        const members = classMembers.get(value.toLowerCase());
        if (members && members.size) {
          members.forEach(function (email) {
            expanded.add(email);
          });
        } else {
          expanded.add("class|" + value.toLowerCase());
        }
        return;
      }

      expanded.add(type + "|" + value.toLowerCase());
    });

    return expanded.size;
  }

  function computeDashboardStats(templateGroups, classGroups, responses, seenNotificationSet) {
    const safeTemplates = Array.isArray(templateGroups) ? templateGroups : [];
    const safeClasses = Array.isArray(classGroups) ? classGroups : [];
    const safeResponses = Array.isArray(responses) ? responses : [];
    const seenSet = seenNotificationSet instanceof Set ? seenNotificationSet : new Set();
    const nowMillis = Date.now();
    const weekStartMillis = getWeekStartMillis(nowMillis);
    const studentDirectory = Array.isArray(recipientDirectory.students) ? recipientDirectory.students : [];

    const studentByEmail = new Map();
    const classMembers = new Map();
    studentDirectory.forEach(function (student) {
      const email = normalizeEmail(student && student.email ? student.email : "");
      if (email) {
        studentByEmail.set(email, student);
      }
      const className = normalizeClassName(student && student.className ? student.className : "");
      if (!className || !email) {
        return;
      }
      const key = className.toLowerCase();
      if (!classMembers.has(key)) {
        classMembers.set(key, new Set());
      }
      classMembers.get(key).add(email);
    });

    const templateTitleById = new Map();
    safeTemplates.forEach(function (group) {
      (group && Array.isArray(group.templateIds) ? group.templateIds : []).forEach(function (templateId) {
        const id = String(templateId || "").trim();
        if (id) {
          templateTitleById.set(id, String(group.title || "").trim());
        }
      });
    });

    const responsesNormalized = safeResponses.map(function (response) {
      const templateId = String(response && response.templateId ? response.templateId : "").trim();
      const templateTitle = String(response && response.templateTitle ? response.templateTitle : "").trim()
        || templateTitleById.get(templateId)
        || "Bez názvu";
      const userEmail = normalizeEmail(response && response.userEmail ? response.userEmail : "");
      const updatedAtMillis = toMillis(response && response.updatedAtMillis ? response.updatedAtMillis : 0);
      const responseKey = String(response && response.responseKey ? response.responseKey : "").trim()
        || [userEmail || "user", templateId || "template", String(updatedAtMillis || 0)].join("|");
      return {
        responseKey: responseKey,
        templateId: templateId,
        templateTitle: templateTitle,
        userEmail: userEmail,
        updatedAtMillis: updatedAtMillis,
        subjects: Array.isArray(response && response.subjects) ? response.subjects : [],
        pillars: Array.isArray(response && response.pillars) ? response.pillars : []
      };
    });

    const deliveredTotal = safeTemplates.reduce(function (sum, group) {
      return sum + computeDeliveredRecipients(group, classMembers);
    }, 0);

    const responsesThisWeek = responsesNormalized.filter(function (item) {
      return (item.updatedAtMillis || 0) >= weekStartMillis;
    }).length;

    const templatesThisWeek = safeTemplates.filter(function (group) {
      return toMillis(group && group.createdAtMillis ? group.createdAtMillis : 0) >= weekStartMillis;
    }).length;

    const pillarCandidatesFromResponses = [];
    responsesNormalized.forEach(function (item) {
      (Array.isArray(item.pillars) ? item.pillars : []).forEach(function (pillar) {
        pillarCandidatesFromResponses.push(pillar);
      });
    });
    const pillarCandidatesFromTemplates = [];
    safeTemplates.forEach(function (group) {
      (group && Array.isArray(group.pillars) ? group.pillars : []).forEach(function (pillar) {
        pillarCandidatesFromTemplates.push(pillar);
      });
    });
    const pillarCountSource = pillarCandidatesFromResponses.length ? pillarCandidatesFromResponses : pillarCandidatesFromTemplates;
    const pillarCounts = {
      zvidavost: 0,
      hodnoty: 0,
      samostatnost: 0
    };
    pillarCountSource.forEach(function (pillar) {
      const slug = normalizeCategorySlug(pillar).replace(/-/g, "");
      if (slug.indexOf("zvidavost") >= 0 || slug.indexOf("zvedavost") >= 0 || slug.indexOf("zvdavost") >= 0) {
        pillarCounts.zvidavost += 1;
        return;
      }
      if (slug.indexOf("hodnoty") >= 0 || slug.indexOf("moralnihodnoty") >= 0) {
        pillarCounts.hodnoty += 1;
        return;
      }
      if (slug.indexOf("samostatnost") >= 0) {
        pillarCounts.samostatnost += 1;
      }
    });
    const topPillar = pickMostFrequentLabel(
      pillarCandidatesFromResponses.length ? pillarCandidatesFromResponses : pillarCandidatesFromTemplates,
      "—"
    );

    const notificationEntries = buildNotificationEntries(safeTemplates, responsesNormalized, seenSet);
    const unreadNotificationsTotal = notificationEntries.reduce(function (sum, item) {
      return sum + (item && item.unread ? 1 : 0);
    }, 0);
    const notifications = notificationEntries.slice(0, 4);

    return {
      weekStartMillis: weekStartMillis,

      classesTotal: safeClasses.length,
      templatesTotal: safeTemplates.length,
      sendsTotal: safeTemplates.length,
      templatesThisWeek: templatesThisWeek,
      responsesThisWeek: responsesThisWeek,
      responsesTotal: responsesNormalized.length,
      deliveredTotal: deliveredTotal,
      topPillar: topPillar,
      pillarCounts: pillarCounts,
      notifications: notifications,
      unreadNotificationsTotal: unreadNotificationsTotal,
      updatedAtMillis: nowMillis
    };
  }

  function buildNotificationEntries(templateGroups, responses, seenSet) {
    const groups = Array.isArray(templateGroups) ? templateGroups : [];
    const sourceResponses = Array.isArray(responses) ? responses : [];
    const seen = seenSet instanceof Set ? seenSet : new Set();

    const templateTitleById = new Map();
    groups.forEach(function (group) {
      const title = String(group && group.title ? group.title : "").trim();
      (group && Array.isArray(group.templateIds) ? group.templateIds : []).forEach(function (templateId) {
        const id = String(templateId || "").trim();
        if (id && title) {
          templateTitleById.set(id, title);
        }
      });
    });

    const studentByEmail = new Map();
    (Array.isArray(recipientDirectory.students) ? recipientDirectory.students : []).forEach(function (student) {
      const email = normalizeEmail(student && student.email ? student.email : "");
      if (email) {
        studentByEmail.set(email, student);
      }
    });

    const normalizedResponses = sourceResponses.map(function (response) {
      const templateId = String(response && response.templateId ? response.templateId : "").trim();
      const fallbackTitle = templateId ? templateTitleById.get(templateId) : "";
      const templateTitle = String(response && response.templateTitle ? response.templateTitle : "").trim() || fallbackTitle || "Bez názvu";
      const userEmail = normalizeEmail(response && response.userEmail ? response.userEmail : "");
      const updatedAtMillis = toMillis(response && response.updatedAtMillis ? response.updatedAtMillis : 0);
      const responseKey = String(response && response.responseKey ? response.responseKey : "").trim()
        || [userEmail || "user", templateId || "template", String(updatedAtMillis || 0)].join("|");
      return {
        responseKey: responseKey,
        templateId: templateId,
        templateTitle: templateTitle,
        userEmail: userEmail,
        updatedAtMillis: updatedAtMillis,
        studentLabel: resolveStudentLabelFromEmail(userEmail, studentByEmail)
      };
    });

    normalizedResponses.sort(function (a, b) {
      return (b.updatedAtMillis || 0) - (a.updatedAtMillis || 0);
    });

    const grouped = new Map();
    normalizedResponses.forEach(function (item) {
      const templateId = String(item && item.templateId ? item.templateId : "").trim();
      const templateTitle = String(item && item.templateTitle ? item.templateTitle : "").trim() || "Bez názvu";
      const fallbackGroupKey = normalizeCategorySlug(templateTitle) || String(item && item.responseKey ? item.responseKey : "").trim() || "template";
      const groupKey = templateId ? "template|" + templateId : "title|" + fallbackGroupKey;
      let entry = grouped.get(groupKey);

      if (!entry) {
        entry = {
          groupKey: groupKey,
          templateId: templateId,
          templateTitle: templateTitle,
          updatedAtMillis: 0,
          latestResponseKey: "",
          responseKeys: [],
          studentLabels: [],
          studentLabelSet: new Set()
        };
        grouped.set(groupKey, entry);
      }

      const updatedAtMillis = toMillis(item && item.updatedAtMillis ? item.updatedAtMillis : 0);
      if (updatedAtMillis >= (entry.updatedAtMillis || 0)) {
        entry.updatedAtMillis = updatedAtMillis;
        entry.latestResponseKey = String(item && item.responseKey ? item.responseKey : "").trim();
        if (!entry.templateTitle && templateTitle) {
          entry.templateTitle = templateTitle;
        }
      }

      const responseKey = String(item && item.responseKey ? item.responseKey : "").trim();
      if (responseKey && entry.responseKeys.indexOf(responseKey) < 0) {
        entry.responseKeys.push(responseKey);
      }

      const studentLabel = String(item && item.studentLabel ? item.studentLabel : "").trim() || "Neznámý žák";
      const studentKey = normalizeSearchText(studentLabel);
      if (studentKey && !entry.studentLabelSet.has(studentKey)) {
        entry.studentLabelSet.add(studentKey);
        entry.studentLabels.push(studentLabel);
      }
    });

    const entries = Array.from(grouped.values()).map(function (entry) {
      const updatedAtMillis = toMillis(entry.updatedAtMillis || 0);
      const notificationKey = [entry.groupKey, String(updatedAtMillis || 0)].join("|");
      const dateLabel = formatDateTime(updatedAtMillis);
      const studentLabels = Array.isArray(entry.studentLabels) ? entry.studentLabels.slice() : [];
      const searchText = normalizeSearchText(
        String(entry.templateTitle || "") + " " + studentLabels.join(" ") + " " + String(dateLabel || "")
      );
      return {
        notificationKey: notificationKey,
        responseKey: notificationKey,
        latestResponseKey: String(entry.latestResponseKey || "").trim(),
        responseKeys: Array.isArray(entry.responseKeys) ? entry.responseKeys.slice() : [],
        templateId: String(entry.templateId || "").trim(),
        templateTitle: String(entry.templateTitle || "").trim() || "Bez názvu",
        studentLabels: studentLabels,
        studentCount: studentLabels.length,
        dateLabel: dateLabel,
        unread: !seen.has(notificationKey),
        updatedAtMillis: updatedAtMillis,
        searchText: searchText
      };
    });

    entries.sort(function (a, b) {
      return (b.updatedAtMillis || 0) - (a.updatedAtMillis || 0);
    });
    return entries;
  }
